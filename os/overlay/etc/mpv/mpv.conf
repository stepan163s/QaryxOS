# QaryxOS mpv configuration
# Optimized for weak ARM hardware (RK3566 and similar)

# --- Hardware decode ---
# auto-safe: uses best available HW decoder without crashing on unsupported codecs
# av1 excluded: no HW decoder on most ARM SoCs (software AV1 kills CPU)
hwdec=auto-safe
hwdec-codecs=h264,hevc,vp9
vd-lavc-dr=yes                    # direct rendering: skip extra buffer copy
video-sync=audio                  # audio-master sync: lighter CPU load on ARM

# --- Output (standalone mpv usage) ---
vo=drm
drm-connector=HDMI-A-1
drm-device=/dev/dri/card0

# --- IPC socket for API control ---
input-ipc-server=/tmp/mpv.sock
input-terminal=no

# --- Cache: start playing fast, buffer grows while watching ---
cache=yes
cache-secs=8
cache-pause=yes
cache-pause-initial=no            # don't wait for full buffer before starting
cache-pause-wait=1                # resume after 1s of buffered data
demuxer-max-bytes=15MiB           # was 50MiB — saves ~35MB RAM
demuxer-readahead-secs=5

# --- IPTV / live streams: low-latency profile ---
[live]
cache=no
cache-pause=no
demuxer-max-bytes=4MiB
demuxer-readahead-secs=2
stream-lavf-o=reconnect=1:reconnect_streamed=1:reconnect_delay_max=2

[default]

# --- Network ---
network-timeout=10
user-agent=Mozilla/5.0

# --- Audio ---
ao=alsa
audio-device=auto
volume=80
volume-max=100

# --- Display ---
fullscreen=yes
keep-open=yes
idle=yes

# --- Subtitles (disabled for streaming) ---
sub-auto=no

# --- OSD ---
osd-level=1
osd-font-size=36

# --- Logging ---
log-file=/var/log/qaryxos-mpv.log
msg-level=all=warn
